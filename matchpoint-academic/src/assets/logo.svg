<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#96ACB7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#96ACB7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8d8e0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon Mark: Stylized "MP" target/crosshair with academic cap hint -->
  <g transform="translate(4, 8)">
    <!-- Outer ring -->
    <circle cx="22" cy="22" r="20" fill="none" stroke="url(#logoGrad)" stroke-width="2"/>
    <!-- Middle ring -->
    <circle cx="22" cy="22" r="13" fill="none" stroke="#96ACB7" stroke-width="1.5" stroke-dasharray="4 2"/>
    <!-- Center dot -->
    <circle cx="22" cy="22" r="4" fill="url(#dotGrad)"/>
    <!-- Cross hairs -->
    <line x1="22" y1="2" x2="22" y2="10" stroke="#96ACB7" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="34" x2="22" y2="42" stroke="#96ACB7" stroke-width="2" stroke-linecap="round"/>
    <line x1="2" y1="22" x2="10" y2="22" stroke="#96ACB7" stroke-width="2" stroke-linecap="round"/>
    <line x1="34" y1="22" x2="42" y2="22" stroke="#96ACB7" stroke-width="2" stroke-linecap="round"/>
    <!-- Academic cap top-right accent -->
    <polygon points="30,6 36,10 30,14" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linejoin="round"/>
    <line x1="30" y1="10" x2="36" y2="10" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Wordmark: MatchPoint -->
  <text x="54" y="28" font-family="Raleway, sans-serif" font-weight="800" font-size="18"
        letter-spacing="1" fill="url(#logoGrad)">Match</text>
  <text x="54" y="28" font-family="Raleway, sans-serif" font-weight="800" font-size="18"
        letter-spacing="1" fill="url(#logoGrad)" dx="52">Point</text>

  <!-- Sub-text: Academic -->
  <text x="54" y="44" font-family="Raleway, sans-serif" font-weight="400" font-size="10"
        letter-spacing="4" fill="#96ACB7">ACADEMIC</text>

  <!-- Tagline separator -->
  <line x1="54" y1="49" x2="195" y2="49" stroke="#96ACB7" stroke-width="0.5" opacity="0.5"/>
</svg>
